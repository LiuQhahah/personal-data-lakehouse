# Personal Data Lakehouse - Docker Compose

services:
  # MinIO - S3 存储
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - lakehouse-net

  # Hive Metastore
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: lakehouse-hive-metastore
    ports:
      - "9083:9083"
    environment:
      HMS_DB: derby
      SERVICE_NAME: metastore
      HIVE_METASTORE_PORT: 9083
    command: /opt/hive/bin/hive --service metastore
    networks:
      - lakehouse-net
    depends_on:
      - minio

  # Gravitino
  gravitino:
    image: apache/gravitino:latest
    container_name: lakehouse-gravitino
    ports:
      - "8090:8090"
    environment:
      GRAVITINO_METASTORE: lakehouse-iceberg
    networks:
      - lakehouse-net
    depends_on:
      - minio

  # Redpanda (Kafka 兼容)
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: lakehouse-redpanda
    ports:
      - "9092:9092"
    command: redpanda start --kafka-addr 0.0.0.0:9092
    networks:
      - lakehouse-net

  # Trino Coordinator
  trino-coordinator:
    image: trinodb/trino:latest
    container_name: lakehouse-trino-coordinator
    ports:
      - "8085:8080"
    volumes:
      - ./trino-config:/etc/trino
      - ./trino-catalog:/etc/trino/catalog
    environment:
      TRINO_COORDINATOR: "true"
    entrypoint: ["/etc/trino/entrypoint.sh"]
    networks:
      - lakehouse-net
    depends_on:
      - hive-metastore

  # Trino Worker
  trino-worker:
    image: trinodb/trino:latest
    container_name: lakehouse-trino-worker
    volumes:
      - ./trino-config:/etc/trino
      - ./trino-catalog:/etc/trino/catalog
    environment:
      TRINO_COORDINATOR: "false"
    entrypoint: ["/etc/trino/entrypoint.sh"]
    networks:
      - lakehouse-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    depends_on:
      - trino-coordinator

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
